<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NordicFlow</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css"/>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="app">

<header class="header">
  <h1>NordicFlow</h1>
  <div id="health" class="badge"></div>
</header>

<section class="cards">
  <div class="card">
    <h3>Net Flow</h3>
    <canvas id="netChart"></canvas>
  </div>

  <div class="card">
    <h3>Mortgage</h3>
    <div id="mortgageInfo"></div>
  </div>

  <div class="card">
    <h3>Euribor</h3>
    <div id="euribor"></div>
  </div>
</section>

<section class="card">
  <h3>Mortgage Setup</h3>
  <input id="loan" placeholder="Total Loan (€)" />
  <input id="years" placeholder="Years" />
  <input id="margin" placeholder="Margin %" />

  <select id="euriborType">
    <option value="12">Euribor 12M</option>
    <option value="6">Euribor 6M</option>
    <option value="3">Euribor 3M</option>
  </select>

  <button onclick="saveMortgage()">Save</button>
</section>

<section class="card">
  <h3>Calendar</h3>
  <input id="eventTitle" placeholder="Event name"/>
  <input id="eventDate" type="date"/>
  <button onclick="addEvent()">Add Event</button>
  <div id="events"></div>
</section>

<section class="insights" id="insights"></section>

<section class="chat">
  <div id="messages"></div>
  <input id="input" placeholder="e.g. spent 120 sek food"/>
</section>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
