<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NordicFlow</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ONBOARDING -->
<div id="onboarding" class="overlay hidden">
  <div class="modal">
    <h2>Welcome to NordicFlow</h2>
    <p>Create your household</p>

    <input id="householdName" placeholder="Family name">
    <button onclick="createHousehold()">Create</button>
  </div>
</div>

<div class="app hidden" id="app">

<header class="header">
  <div>
    <h1>NordicFlow</h1>
    <p class="sub">Financial system</p>
  </div>
  <div id="health" class="status">...</div>
</header>

<section id="home" class="page active">

  <div class="hero skeleton" id="hero">
    <h2 id="netWorth">€0</h2>
    <p>Net Worth</p>
  </div>

  <section class="ai skeleton" id="aiCard">
    <div id="insights">Loading insights...</div>
  </section>

  <div class="grid">

    <div class="card skeleton">
      <h4>Cash Flow</h4>
      <div id="cashFlow">0</div>
    </div>

    <div class="card skeleton">
      <h4>Mortgage</h4>
      <div id="mortgageInfo">Not set</div>
    </div>

    <div class="card skeleton">
      <h4>Euribor</h4>
      <div id="euribor">--%</div>
    </div>

  </div>

</section>

<section id="analytics" class="page">
  <div class="card">
    <h3>Spending Breakdown</h3>
    <canvas id="pieChart"></canvas>
  </div>
</section>

<section id="calendar" class="page">

  <div class="card">
    <h3>Add Event</h3>
    <input id="eventTitle" placeholder="Event">
    <input id="eventDate" type="date">
    <button onclick="addEvent()">Add</button>
  </div>

  <div class="card">
    <h3>Upcoming</h3>
    <div id="events"></div>
  </div>

</section>

<section id="settings" class="page">

  <div class="card">
    <h3>Mortgage Setup</h3>
    <input id="loan" placeholder="Loan">
    <input id="years" placeholder="Years">
    <input id="margin" placeholder="Margin %">

    <button onclick="saveMortgage()">Save</button>
  </div>

  <div class="card">
    <h3>Invite Spouse</h3>
    <input id="inviteEmail" placeholder="Email">
    <button onclick="invite()">Send Invite</button>
  </div>

</section>

</div>

<div class="chat">
  <input id="input" placeholder="Type: spent 120 food...">
</div>

<nav class="nav">
  <div class="nav-item active" onclick="switchTab('home', this)">Home</div>
  <div class="nav-item" onclick="switchTab('analytics', this)">Analytics</div>
  <div class="nav-item" onclick="switchTab('calendar', this)">Calendar</div>
  <div class="nav-item" onclick="switchTab('settings', this)">Settings</div>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
